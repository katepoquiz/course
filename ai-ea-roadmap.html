          { day: 162, focus: "Capstone 3 (optional) or improve existing project", artifact: "Third capstone or enhanced project" },
          { day: 163, focus: "Capstone 3: complete and document", artifact: "Case study or enhanced documentation" },
          { day: 164, focus: "Review all capstones. Get feedback.", artifact: "Feedback notes + revision plan" },
          { day: 165, focus: "Final capstone polish based on feedback", artifact: "Finalized capstone projects" },
        ],
        checklist: [
          "Have 2-3 portfolio-quality capstone projects",
          "Each capstone has a complete case study",
          "Projects demonstrate different skill sets",
          "Have received feedback and incorporated it",
          "Would feel confident presenting in an interview",
        ],
      },
      {
        id: 12, title: "Career Sprint", days: "Days 166-180",
        tools: ["Claude", "LinkedIn", "Your portfolio platform"],
        problem: "Skills without packaging are invisible. Turn your journey into opportunities.",
        tasks: [
          { day: 166, focus: "Portfolio: catalog all 150+ artifacts by category", artifact: "Master artifact inventory" },
          { day: 167, focus: "Portfolio: decide format and platform", artifact: "Portfolio outline" },
          { day: 168, focus: 'Portfolio: write "About Me" and professional story', artifact: "Professional bio and journey narrative" },
          { day: 169, focus: "Portfolio: curate top 10 projects with descriptions", artifact: "Portfolio project showcase" },
          { day: 170, focus: "Portfolio: add case studies and screenshots", artifact: "Visual portfolio with evidence" },
          { day: 171, focus: "Portfolio: create your AI Skills Matrix", artifact: "Skills matrix with competencies and evidence" },
          { day: 172, focus: "Resume: rewrite with AI-powered EA positioning", artifact: "Updated resume" },
          { day: 173, focus: "LinkedIn: headline, summary, featured section", artifact: "Updated LinkedIn profile" },
          { day: 174, focus: 'LinkedIn: write "What I Learned in 180 Days" post', artifact: "Long-form LinkedIn post" },
          { day: 175, focus: "Interview prep: turn each capstone into a STAR story", artifact: "5 STAR interview stories" },
          { day: 176, focus: "Interview prep: common AI-for-EA questions", artifact: "Interview prep document with 15+ Q&As" },
          { day: 177, focus: "Create a shareable resource for other EAs", artifact: "Template pack, guide, or toolkit" },
          { day: 178, focus: "Future planning: goals for the next 6 months", artifact: "Personal roadmap v2" },
          { day: 179, focus: "Final portfolio review and polish", artifact: "Complete, polished portfolio" },
          { day: 180, focus: "Celebrate. You did it. Post your story.", artifact: "Final reflection + celebration post" },
        ],
        checklist: [
          "Portfolio is complete, polished, and shareable",
          "Resume positions you as an AI-powered EA",
          "LinkedIn is updated with featured projects",
          "Have 5 STAR stories ready for interviews",
          "Have created a shareable resource for other EAs",
          "Have a clear plan for what's next",
          "Feel confident calling yourself an AI-Powered EA",
        ],
      },
    ],
  },
];

const ARTIFACT_CATEGORIES = [
  { key: "prompts", label: "Prompts", target: 50, icon: "\u{1F4AC}" },
  { key: "sops", label: "SOPs", target: 20, icon: "\u{1F4CB}" },
  { key: "workspaces", label: "AI Workspaces", target: 10, icon: "\u{1F9E0}" },
  { key: "automations", label: "Automations", target: 20, icon: "\u26A1" },
  { key: "dashboards", label: "Dashboards", target: 5, icon: "\u{1F4CA}" },
  { key: "caseStudies", label: "Case Studies", target: 10, icon: "\u{1F4D6}" },
  { key: "templates", label: "Templates", target: 30, icon: "\u{1F4C4}" },
  { key: "portfolioProjects", label: "Portfolio Projects", target: 10, icon: "\u{1F3C6}" },
];

const STORAGE_KEY = "ai-ea-roadmap-progress";

function App() {
  const [completedTasks, setCompletedTasks] = useState({});
  const [completedChecklist, setCompletedChecklist] = useState({});
  const [artifactCounts, setArtifactCounts] = useState({});
  const [expandedSprint, setExpandedSprint] = useState(null);
  const [activePhase, setActivePhase] = useState(1);
  const [view, setView] = useState("roadmap");

  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const data = JSON.parse(saved);
        setCompletedTasks(data.completedTasks || {});
        setCompletedChecklist(data.completedChecklist || {});
        setArtifactCounts(data.artifactCounts || {});
      }
    } catch (e) { console.log("No saved data"); }
  }, []);

  const save = useCallback((tasks, checklist, artifacts) => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        completedTasks: tasks, completedChecklist: checklist, artifactCounts: artifacts,
      }));
    } catch (e) { console.error("Save failed:", e); }
  }, []);

  const toggleTask = (day) => {
    const next = { ...completedTasks, [day]: !completedTasks[day] };
    setCompletedTasks(next);
    save(next, completedChecklist, artifactCounts);
  };

  const toggleChecklist = (sprintId, idx) => {
    const key = sprintId + "-" + idx;
    const next = { ...completedChecklist, [key]: !completedChecklist[key] };
    setCompletedChecklist(next);
    save(completedTasks, next, artifactCounts);
  };

  const updateArtifact = (key, delta) => {
    const current = artifactCounts[key] || 0;
    const next = { ...artifactCounts, [key]: Math.max(0, current + delta) };
    setArtifactCounts(next);
    save(completedTasks, completedChecklist, next);
  };

  const totalDays = 180;
  const completedDays = Object.values(completedTasks).filter(Boolean).length;
  const overallProgress = Math.round((completedDays / totalDays) * 100);

  const getPhaseProgress = (phase) => {
    let total = 0, done = 0;
    phase.sprints.forEach(function(s) {
      s.tasks.forEach(function(t) { total++; if (completedTasks[t.day]) done++; });
    });
    return total > 0 ? Math.round((done / total) * 100) : 0;
  };

  const getSprintProgress = (sprint) => {
    let done = 0;
    sprint.tasks.forEach(function(t) { if (completedTasks[t.day]) done++; });
    return Math.round((done / sprint.tasks.length) * 100);
  };

  return (
    React.createElement("div", { style: { fontFamily: "'Inter', -apple-system, system-ui, sans-serif", background: "#FAFAF9", minHeight: "100vh", color: "#1E293B" } },
      // Header
      React.createElement("div", { style: { background: "linear-gradient(135deg, #0F172A 0%, #1E293B 100%)", color: "white", padding: "32px 24px 24px" } },
        React.createElement("div", { style: { maxWidth: 800, margin: "0 auto" } },
          React.createElement("div", { style: { fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#94A3B8", marginBottom: 8 } }, "180-DAY ROADMAP"),
          React.createElement("h1", { style: { fontSize: 22, fontWeight: 700, margin: "0 0 4px", lineHeight: 1.3 } }, "The AI-Powered Executive Assistant"),
          React.createElement("p", { style: { fontSize: 13, color: "#94A3B8", margin: 0 } }, "Build skills, systems, and a portfolio"),
          // Progress
          React.createElement("div", { style: { marginTop: 20 } },
            React.createElement("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, color: "#94A3B8", marginBottom: 6 } },
              React.createElement("span", null, completedDays + " of " + totalDays + " days completed"),
              React.createElement("span", null, overallProgress + "%")
            ),
            React.createElement("div", { style: { height: 6, background: "#334155", borderRadius: 3, overflow: "hidden" } },
              React.createElement("div", { style: { height: "100%", width: overallProgress + "%", background: "linear-gradient(90deg, #3B82F6, #8B5CF6, #EC4899)", borderRadius: 3, transition: "width 0.3s" } })
            )
          ),
          // Tabs
          React.createElement("div", { style: { display: "flex", gap: 0, marginTop: 20, borderBottom: "1px solid #334155" } },
            ["roadmap", "tracker"].map(function(tab) {
              var label = tab === "roadmap" ? "Roadmap" : "Artifact Tracker";
              return React.createElement("button", {
                key: tab, onClick: function() { setView(tab); },
                style: {
                  background: "none", border: "none", color: view === tab ? "white" : "#64748B",
                  fontSize: 13, fontWeight: 600, padding: "8px 16px", cursor: "pointer",
                  borderBottom: view === tab ? "2px solid #3B82F6" : "2px solid transparent",
                  marginBottom: -1,
                }
              }, label);
            })
          )
        )
      ),
      // Content
      React.createElement("div", { style: { maxWidth: 800, margin: "0 auto", padding: "0 16px 60px" } },
        view === "tracker" ?
          // Artifact Tracker
          React.createElement("div", { style: { paddingTop: 24 } },
            React.createElement("p", { style: { fontSize: 13, color: "#64748B", marginBottom: 20 } }, "Track your artifact counts. Progress is measured by what you build, not days you show up."),
            React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 } },
              ARTIFACT_CATEGORIES.map(function(cat) {
                var count = artifactCounts[cat.key] || 0;
                var pct = Math.min(100, Math.round((count / cat.target) * 100));
                return React.createElement("div", { key: cat.key, style: { background: "white", borderRadius: 12, padding: 16, border: "1px solid #E2E8F0" } },
                  React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
                    React.createElement("span", { style: { fontSize: 13, fontWeight: 600 } }, cat.icon + " " + cat.label),
                    React.createElement("span", { style: { fontSize: 11, color: "#94A3B8" } }, "Goal: " + cat.target)
                  ),
                  React.createElement("div", { style: { fontSize: 28, fontWeight: 700, marginBottom: 8, color: pct >= 100 ? "#10B981" : "#1E293B" } }, count),
                  React.createElement("div", { style: { height: 4, background: "#F1F5F9", borderRadius: 2, marginBottom: 8 } },
                    React.createElement("div", { style: { height: "100%", width: pct + "%", background: pct >= 100 ? "#10B981" : "#3B82F6", borderRadius: 2, transition: "width 0.3s" } })
                  ),
                  React.createElement("div", { style: { display: "flex", gap: 8 } },
                    React.createElement("button", { onClick: function() { updateArtifact(cat.key, -1); }, style: { flex: 1, padding: "6px 0", border: "1px solid #E2E8F0", borderRadius: 6, background: "white", cursor: "pointer", fontSize: 16, color: "#64748B" } }, "\u2212"),
                    React.createElement("button", { onClick: function() { updateArtifact(cat.key, 1); }, style: { flex: 1, padding: "6px 0", border: "1px solid #E2E8F0", borderRadius: 6, background: "white", cursor: "pointer", fontSize: 16, color: "#3B82F6", fontWeight: 600 } }, "+")
                  )
                );
              })
            )
          )
        :
          // Roadmap
          React.createElement("div", { style: { paddingTop: 16 } },
            // Phase selector
            React.createElement("div", { style: { display: "flex", gap: 6, overflowX: "auto", padding: "8px 0 16px", WebkitOverflowScrolling: "touch" } },
              PHASES.map(function(phase) {
                return React.createElement("button", {
                  key: phase.id,
                  onClick: function() { setActivePhase(phase.id); setExpandedSprint(null); },
                  style: {
                    flexShrink: 0, padding: "8px 14px", borderRadius: 8, border: "none", cursor: "pointer",
                    fontSize: 12, fontWeight: 600, whiteSpace: "nowrap",
                    background: activePhase === phase.id ? phase.color : "#F1F5F9",
                    color: activePhase === phase.id ? "white" : "#64748B",
                    transition: "all 0.2s",
                  }
                }, "Phase " + phase.id);
              })
            ),
            // Active phase
            PHASES.filter(function(p) { return p.id === activePhase; }).map(function(phase) {
              return React.createElement("div", { key: phase.id },
                React.createElement("div", { style: { marginBottom: 20 } },
                  React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 10, marginBottom: 4, flexWrap: "wrap" } },
                    React.createElement("h2", { style: { fontSize: 18, fontWeight: 700, margin: 0 } }, "Phase " + phase.id + ": " + phase.title),
                    React.createElement("span", { style: { fontSize: 11, color: "#94A3B8", background: "#F1F5F9", padding: "2px 8px", borderRadius: 4 } }, phase.days)
                  ),
                  React.createElement("p", { style: { fontSize: 13, color: "#64748B", margin: 0 } }, phase.description),
                  React.createElement("div", { style: { marginTop: 8, height: 4, background: "#F1F5F9", borderRadius: 2 } },
                    React.createElement("div", { style: { height: "100%", width: getPhaseProgress(phase) + "%", background: phase.color, borderRadius: 2, transition: "width 0.3s" } })
                  ),
                  React.createElement("div", { style: { fontSize: 11, color: "#94A3B8", marginTop: 4 } }, getPhaseProgress(phase) + "% complete")
                ),
                // Sprints
                phase.sprints.map(function(sprint) {
                  var isExpanded = expandedSprint === sprint.id;
                  var sprintPct = getSprintProgress(sprint);
                  return React.createElement("div", { key: sprint.id, style: { marginBottom: 12, background: "white", borderRadius: 12, border: "1px solid #E2E8F0", overflow: "hidden" } },
                    React.createElement("button", {
                      onClick: function() { setExpandedSprint(isExpanded ? null : sprint.id); },
                      style: { width: "100%", padding: "16px", border: "none", background: "none", cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "center" }
                    },
                      React.createElement("div", null,
                        React.createElement("div", { style: { fontSize: 14, fontWeight: 700, color: "#1E293B", marginBottom: 2 } }, "Sprint " + sprint.id + ": " + sprint.title),
                        React.createElement("div", { style: { fontSize: 12, color: "#94A3B8" } }, sprint.days),
                        React.createElement("div", { style: { display: "flex", gap: 4, marginTop: 6, flexWrap: "wrap" } },
                          sprint.tools.map(function(tool, i) {
                            return React.createElement("span", { key: i, style: { fontSize: 10, padding: "2px 6px", background: "#F1F5F9", borderRadius: 4, color: "#64748B" } }, tool);
                          })
                        )
                      ),
                      React.createElement("div", { style: { textAlign: "right", flexShrink: 0 } },
                        React.createElement("div", { style: { fontSize: 20, fontWeight: 700, color: sprintPct === 100 ? "#10B981" : phase.color } }, sprintPct + "%"),
                        React.createElement("div", { style: { fontSize: 18, transform: isExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s", color: "#94A3B8" } }, "\u25BE")
                      )
                    ),
                    isExpanded && React.createElement("div", { style: { padding: "0 16px 16px", borderTop: "1px solid #F1F5F9" } },
                      React.createElement("div", { style: { padding: "12px 0 8px", fontSize: 12, color: "#64748B", fontStyle: "italic" } }, sprint.problem),
                      React.createElement("div", { style: { fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: "#94A3B8", marginTop: 12, marginBottom: 8 } }, "DAILY TASKS"),
                      sprint.tasks.map(function(task) {
                        return React.createElement("div", {
                          key: task.day,
                          onClick: function() { toggleTask(task.day); },
                          style: { display: "flex", gap: 10, padding: "10px 0", borderBottom: "1px solid #F8FAFC", cursor: "pointer", opacity: completedTasks[task.day] ? 0.5 : 1, transition: "opacity 0.2s" }
                        },
                          React.createElement("div", {
                            style: {
                              width: 20, height: 20, borderRadius: 6, flexShrink: 0, marginTop: 1,
                              border: completedTasks[task.day] ? "none" : "2px solid #CBD5E1",
                              background: completedTasks[task.day] ? phase.color : "transparent",
                              display: "flex", alignItems: "center", justifyContent: "center",
                              color: "white", fontSize: 12,
                            }
                          }, completedTasks[task.day] ? "\u2713" : ""),
                          React.createElement("div", { style: { flex: 1, minWidth: 0 } },
                            React.createElement("div", { style: { fontSize: 12, fontWeight: 600, color: "#334155", marginBottom: 2 } },
                              React.createElement("span", { style: { color: "#94A3B8", marginRight: 6 } }, "Day " + task.day),
                              task.focus
                            ),
                            React.createElement("div", { style: { fontSize: 11, color: "#94A3B8" } }, "\u2192 " + task.artifact)
                          )
                        );
                      }),
                      React.createElement("div", { style: { fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: "#94A3B8", marginTop: 20, marginBottom: 8 } }, "SUCCESS CHECKLIST"),
                      sprint.checklist.map(function(item, idx) {
                        var key = sprint.id + "-" + idx;
                        var checked = completedChecklist[key];
                        return React.createElement("div", {
                          key: idx,
                          onClick: function() { toggleChecklist(sprint.id, idx); },
                          style: { display: "flex", gap: 10, padding: "8px 0", cursor: "pointer", alignItems: "flex-start" }
                        },
                          React.createElement("div", {
                            style: {
                              width: 18, height: 18, borderRadius: 4, flexShrink: 0,
                              border: checked ? "none" : "2px solid #CBD5E1",
                              background: checked ? "#10B981" : "transparent",
                              display: "flex", alignItems: "center", justifyContent: "center",
                              color: "white", fontSize: 11,
                            }
                          }, checked ? "\u2713" : ""),
                          React.createElement("span", { style: { fontSize: 12, color: checked ? "#94A3B8" : "#475569", textDecoration: checked ? "line-through" : "none" } }, item)
                        );
                      })
                    )
                  );
                })
              );
            })
          )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
