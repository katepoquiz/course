{day:1,course:{name:"Claude 101",duration:"2-3 hrs",type:"anthropic"},focus:"What is Claude? How do LLMs work? Explore the interface.",artifact:"Cheat sheet: \"What AI Can and Can't Do\"",detail:"Spend today exploring Claude's interface. Try different types of questions: factual, creative, analytical. Note what it does well and where it struggles. Your cheat sheet should be something you can reference later."},
{day:2,course:{name:"Claude Platform 101",duration:"1 hr",type:"anthropic"},focus:"Prompt structure: role + context + task",artifact:"3 prompts using role-context-task format",detail:"The foundation of good prompting. Every prompt should tell Claude WHO it is (role), WHAT it needs to know (context), and WHAT you want it to do (task). Write 3 prompts for real EA tasks using this structure."},
{day:3,focus:"Output formatting: bullets, tables, step-by-step",artifact:"Prompt: \"Format a weekly executive update\"",detail:"Claude can output in any format you specify. Practice asking for tables, numbered lists, headers, and specific structures. Your exec update prompt should produce a clean, scannable format."},
{day:4,focus:"Few-shot prompting: teaching by example",artifact:"Prompt: \"Draft a professional email\" with tone examples",detail:"Instead of describing the tone you want, SHOW Claude examples. Paste 2-3 sample emails and say \"write in this style.\" This is one of the most powerful techniques for matching your executive's voice."},
{day:5,focus:"Iterative prompting: improving through conversation",artifact:"Prompt chain: rough draft, refined, final",detail:"Don't try to get the perfect output in one shot. Start with a rough draft prompt, then refine: \"Make it shorter,\" \"More formal tone,\" \"Add a call to action.\" Document the chain so you can reuse the pattern."},
{day:6,focus:"Summarization: turning long content into key points",artifact:"Prompt: \"Summarize meeting notes into action items\"",detail:"This is one of the highest-value EA skills. Practice with different summary types: executive summary (2-3 sentences), key decisions, action items with owners, and open questions."},
{day:7,course:{name:"AI Fluency: Framework & Foundations",duration:"1 hr",type:"anthropic"},focus:"Review day. Organize everything so far.",artifact:"Prompt library v1 (organized by category)",detail:"Take all the prompts you've created this week and organize them into categories (Communication, Research, Planning, etc.). This library will grow to 50+ prompts by Day 180."},
{day:8,focus:"Negative prompting: constraints and boundaries",artifact:"5 improved prompts with \"do not\" rules",detail:"Telling Claude what NOT to do is as important as telling it what to do. \"Do not use jargon,\" \"Do not exceed 100 words,\" \"Do not include disclaimers.\" Go back to 5 earlier prompts and add constraints."},
{day:9,focus:"System prompts: setting Claude's persona and behavior",artifact:"System prompt: \"EA Writing Assistant\"",detail:"System prompts set persistent rules for how Claude behaves. Create one that defines Claude as your writing assistant: tone, vocabulary, formatting preferences, things to always/never include."},
{day:10,focus:"Prompt chaining: multi-step sequences",artifact:"Chain: research, outline, draft, polish",detail:"Complex tasks work better as chains. Step 1: research a topic. Step 2: create an outline from the research. Step 3: draft from the outline. Step 4: polish the draft. Document each step."},
{day:11,focus:"Structured outputs: tables, JSON, specific formats",artifact:"Prompt: \"Create a structured meeting agenda\"",detail:"Practice getting Claude to output in precise structures: tables with specific columns, checklists with categories, agendas with time blocks. The meeting agenda should be ready to paste into a doc."},
{day:12,focus:"Claude Projects: creating persistent AI workspaces",artifact:"Claude Project: \"Email Drafting Assistant\"",detail:"Claude Projects let you save custom instructions and upload reference documents. Set up your first Project with your executive's communication style, common contacts, and email templates."},
{day:13,course:{name:"AI Capabilities and Limitations",duration:"1 hr",type:"anthropic"},focus:"Adding knowledge to Projects (uploading context docs)",artifact:"Claude Project with uploaded style guide or SOPs",detail:"Upload documents that give Claude context: your company's style guide, SOPs, org chart, or communication templates. The more relevant context, the better the outputs."},
{day:14,focus:"Template prompts inside Projects",artifact:"5 reusable template prompts in your Projects",detail:"Create starter prompts within your Projects that you'll use repeatedly: \"Draft a follow-up email to [name] about [topic],\" \"Summarize this meeting transcript,\" etc."},
{day:15,focus:"Sprint review. Polish and document everything.",artifact:"Sprint 1 summary + public learning post",detail:"Review everything you built this sprint. Improve your weakest prompts. Write a reflection on what you learned. Post a summary of your Sprint 1 journey."},
],

skills:["Executive travel planning and logistics","Board meeting and board report preparation","Confidential document handling and protocols","Executive priority tracking and alignment","Event and offsite planning","Stakeholder management"],

useCases:["Preparing a CEO for a high-stakes client meeting in under 30 minutes","Planning a multi-city executive trip with backup contingencies","Creating a board report package with all required components","Organizing a 50-person offsite from venue to agenda","Managing confidential documents with proper access controls"],
exercises:["Plan a hypothetical 3-day executive trip to Singapore: flights, hotels, ground transport, meetings schedule, restaurant reservations, backup plans.","Create a board report template based on research into what boards typically want to see.","Build an executive priority tracker that shows top 5 priorities an executive could glance at in 30 seconds."],
miniProject:{title:"The EA Playbook",desc:"A collection of 8-10 SOPs covering the hardest parts of executive support, each with step-by-step instructions, AI prompts, templates, and pro tips."},
portfolioProject:{title:"Executive Support Systems: A Case Study",desc:"Pick your 3 strongest challenge solutions and write them up as case studies. For each: the challenge, your approach, the system you built, and how it would save time in a real role."},
mistakes:["Making solutions too generic instead of specific to real scenarios","Skipping the confidential document challenge (this is a real skill gap)","Not stress-testing with edge cases (flight cancellation, last-minute changes)","Creating beautiful templates nobody would actually use under time pressure"],
tasks:[
{day:61,focus:"Challenge: How do I prepare a CEO for an important meeting?",artifact:"SOP + prompts: \"CEO Meeting Prep\"",detail:"CEO prep is different from regular meeting prep. Higher stakes, deeper research, more strategic talking points. Build a system that covers: attendee research, relationship history, strategic objectives, potential landmines, and recommended positions."},
{day:62,focus:"Build the full CEO prep workflow",artifact:"Complete CEO meeting prep system",detail:"Take yesterday's SOP and build out the full system: Claude prompts for research, a brief template with all sections, a timing guide (how far in advance to start), and a quality checklist."},
{day:63,focus:"Challenge: How do I plan executive travel?",artifact:"SOP: \"Executive Travel Planning Checklist\"",detail:"Cover every aspect: flights (preferences, loyalty programs), hotels (location, amenities), ground transport, timezone management, meeting logistics, restaurant reservations, emergency contacts, backup plans for delays."},
{day:64,focus:"Create a travel planning template",artifact:"Travel template + packing list generator",detail:"Build a comprehensive travel document template: daily itinerary with times and addresses, travel documents checklist, expense tracking, contact list, and a Claude prompt that generates a customized packing list based on destination and meeting types."},
{day:65,focus:"Challenge: How do I manage confidential documents?",artifact:"SOP: \"Confidential Document Protocol\"",detail:"Cover classification levels, access controls, sharing procedures, storage requirements, naming conventions, version control, and what to do if something is shared inappropriately. This is a real skill gap for many EAs."},
{day:66,focus:"Challenge: How do I prepare a board report?",artifact:"Board report template + preparation SOP",detail:"Research what boards typically expect: financial overview, strategic updates, key decisions needed, risk assessment, appendix with supporting data. Create a template and a timeline for gathering information."},
{day:67,course:{name:"Claude Code 101",duration:"1-1.5 hrs",type:"anthropic"},focus:"Review day. Test all systems with realistic scenarios.",artifact:"Refined systems + documentation",detail:"Take each system you've built and stress-test it. What if the CEO's flight gets cancelled? What if a board member asks for information not in the report? Fix the gaps."},
{day:68,focus:"Challenge: How do I organize an offsite or team event?",artifact:"Event planning template + timeline checklist",detail:"Cover: venue selection criteria, budget template, agenda design, logistics (travel, accommodation, meals), materials preparation, communication plan, and post-event follow-up."},
{day:69,focus:"Build the full event planning workflow",artifact:"Complete event planning system",detail:"Expand yesterday's template into a complete system with timeline (12 weeks out to day-of), task assignment templates, vendor communication templates, and contingency plans."},
{day:70,focus:"Challenge: How do I track executive priorities?",artifact:"Executive priority tracker (Google Sheets)",detail:"Build a tracker showing: Top 5 priorities, status (on track/at risk/blocked), key milestones, dependencies, and next actions. Should be glanceable in 30 seconds. Use conditional formatting heavily."},
{day:71,focus:"Challenge: How do I manage multiple stakeholders?",artifact:"Stakeholder map template + communication tracker",detail:"Create a stakeholder map (who are they, what do they care about, how often do they need updates) and a communication tracker (last contact, next touchpoint, relationship health)."},
{day:72,focus:"Challenge: Weekly executive briefing (enhanced)",artifact:"Enhanced weekly briefing system",detail:"Take your briefing system from Sprint 4 and level it up: add stakeholder updates, priority tracking changes, upcoming decisions, and a \"what you need to know\" executive summary section."},
{day:73,focus:"Challenge: How do I onboard myself to a new executive?",artifact:"\"First 30 Days\" onboarding template for EAs",detail:"If you started supporting a new executive tomorrow, what would you need to learn? Communication preferences, key relationships, recurring meetings, tools, processes, pet peeves. Create a systematic discovery template."},
{day:74,focus:"Compile all challenges into a \"Real EA Playbook\"",artifact:"EA Playbook v1 (all challenges organized)",detail:"Bring all your challenge solutions into one organized document. This is your signature portfolio piece: a comprehensive guide to executive support that demonstrates real-world competence."},
{day:75,focus:"Sprint review. Document everything.",artifact:"Sprint 5 summary + public learning post",detail:"Review Sprint 5. This was a content-heavy sprint. Make sure every SOP, template, and system is properly stored in your personal AI system. Share your EA Playbook progress publicly."},
],
checklist:["Have 8+ SOPs covering real EA challenges","Each challenge has a working system","Executive priority tracker is functional and clear","Board report template is professional and complete","Travel planning system handles complexity","Could walk into a new EA role and handle these on Day 1"],
},
{id:6,title:"Build a Client Operations System",days:"Days 76-90",
tools:["GoHighLevel (free trial)","Claude","Google Sheets"],
toolCourses:[{name:"GoHighLevel Official Tutorials",type:"Free",note:"Start with Dashboard Overview, then Contacts, Pipelines, Workflows"},{name:"AI Automation PH YouTube: GHL Series",type:"Free",note:"Kuya RJ's GHL setup and automation videos"},{name:"GHL Help Documentation",type:"Free",note:"Reference for specific features and troubleshooting"},{name:"Technical Virtual Assistants PH Course",type:"Paid (\u20B14,699)",note:"Full GHL training with community support - enroll at Day 90 decision point"}],
problem:"Executives need systems for managing clients, leads, and business relationships at scale. Understanding CRM and operations makes you valuable beyond administrative support.",
objective:"Learn CRM concepts, build a working pipeline, create forms and automations, and document a complete client operations system.",
skills:["CRM concepts (contacts, deals, pipelines, stages)","GoHighLevel navigation and setup","Pipeline design (stages, triggers, outcomes)","Forms and data collection","Calendar booking setup","Basic GHL workflows (trigger, action)","How CRM supports executive decision-making"],
resources:["AI Automation PH YouTube: GHL basics and setup videos - Free","GoHighLevel official tutorials - Free","GoHighLevel 14-day free trial","GHL help documentation - Free"],
useCases:["Managing your executive's key client relationships","Tracking a sales or partnership pipeline","Automating appointment scheduling and confirmations","Creating intake forms for new clients or projects","Generating CRM reports for executive review"],
exercises:["Design a 5-stage pipeline for a real business process. Map what happens at each stage.","Create a form that collects the right information and connects to your pipeline.","Build a 3-step workflow: form submission, contact creation, notification to you."],
miniProject:{title:"Client Onboarding System",desc:"Form, CRM entry, pipeline placement, welcome email, calendar booking link, follow-up reminder. A complete system from first contact to onboarded."},
portfolioProject:{title:"CRM Setup Guide for Executive Assistants",desc:"A step-by-step guide showing how an EA would set up a CRM from scratch. Include pipeline templates, tag systems, workflow examples. The documentation is the portfolio piece, even after the trial ends."},
mistakes:["Creating too many pipeline stages (5-7 is usually enough)","Not establishing a tagging system from the start","Building workflows too complex before understanding basics","Getting lost in features and forgetting to solve a problem"],
tasks:[
{day:76,focus:"CRM concepts: what they are, why they matter",artifact:"Cheat sheet: \"CRM for Executive Assistants\"",detail:"Before touching any tool, understand the concepts: contacts, leads, opportunities, pipelines, stages, tags, custom fields. Write a cheat sheet explaining each in plain language."},
{day:77,focus:"Start GHL free trial. Explore the dashboard.",artifact:"Documentation: \"GHL Platform Overview\"",detail:"Start your 14-day free trial now. Don't build anything yet. Just explore: main menu, settings, contacts area, pipeline view, workflows, forms, calendars. Document what you find."},
{day:78,focus:"Contacts: adding, tagging, custom fields",artifact:"Contact management SOP + tag system template",detail:"Add 10+ sample contacts. Create a tag system (by type, by status, by source). Add custom fields that would be useful (birthday, company, role, last meeting date). Document your system."},
{day:79,focus:"Pipelines: designing stages for a business process",artifact:"Pipeline template: \"Client Onboarding\"",detail:"Design a pipeline with 5-7 stages. For each stage: name, definition (what qualifies a contact to be here), actions (what happens at this stage), and exit criteria (when do they move to the next stage)."},
{day:80,focus:"Building your first pipeline with sample data",artifact:"Working pipeline with 10+ sample contacts",detail:"Build the pipeline in GHL. Add your sample contacts to different stages. Move them through the pipeline manually to understand the flow. Take screenshots for your portfolio."},
{day:81,focus:"Forms: creating intake and data collection forms",artifact:"Form: \"Client Intake Form\"",detail:"Build a form that collects the information your pipeline needs: name, email, company, what they're looking for, how they found you, preferred contact method, best time to reach them."},
{day:82,course:{name:"Claude Code in Action",duration:"1.5-2 hrs",type:"anthropic"},focus:"Review day. Test pipeline with realistic scenarios.",artifact:"Refined pipeline + documentation",detail:"Walk through 3 realistic scenarios: a new lead fills out your form, an existing client needs to be moved through stages, a deal falls through. Does your system handle all of these?"},
{day:83,focus:"Calendar booking: appointment types, availability",artifact:"Calendar: \"Executive Meeting Scheduler\"",detail:"Set up a booking calendar with 2-3 appointment types (15-min intro call, 30-min meeting, 60-min strategy session). Configure availability, buffer times, and confirmation messages."},
{day:84,focus:"GHL Workflows intro: triggers and actions",artifact:"Cheat sheet: \"GHL Workflow Building Blocks\"",detail:"Learn workflow vocabulary: triggers (what starts it), actions (what happens), conditions (if/then logic), wait steps (delays), and goals (when to stop). Document with examples."},
{day:85,focus:"Workflow: form, CRM entry, notification",artifact:"Automation: \"New Lead Notification\"",detail:"Build your first real workflow: when someone fills out your form, create/update their contact, assign a tag, and send you a notification. Test it by filling out your own form."},
{day:86,focus:"Workflow: appointment booking, confirmation email",artifact:"Automation: \"Appointment Confirmation\"",detail:"When someone books an appointment, send them a confirmation email with meeting details, add the event to calendar, and notify you. Test the entire flow."},
{day:87,focus:"Workflow: pipeline stage change, automated action",artifact:"Automation: \"Pipeline Stage Actions\"",detail:"When a contact moves to a specific pipeline stage, trigger an action: send an email, create a task, update a tag. Build workflows for 2-3 key stage transitions."},
{day:88,focus:"End-to-end: form, CRM, pipeline, booking, follow-up",artifact:"Complete client operations workflow",detail:"Connect everything: form submission triggers CRM entry and pipeline placement. Welcome email goes out with booking link. After booking, confirmation and reminder sequence. Document the complete flow."},
{day:89,focus:"Document the entire GHL setup as a case study",artifact:"GHL case study with screenshots",detail:"Write a case study: the problem (manual client management), the solution (your GHL system), the components, how they connect, and the results. Include screenshots. This works as a portfolio piece even after the trial ends."},
{day:90,focus:"Phase 3 complete. Sprint review. Milestone check.",artifact:"Milestone review + public learning post",detail:"Phase 3 done! Review artifact counts. Check if it's time to enroll in the Technical Virtual Assistants PH course. Write your Phase 3 reflection. You're halfway there."},
],
checklist:["Can explain CRM concepts to a non-technical person","Have a working pipeline with stages and contacts","Have created a form connected to your CRM","Have built 3+ automated workflows","Have an end-to-end client operations system","Understand automation logic (if X, then Y)","Have a case study for your portfolio"],
},
]},
{id:4,title:"Automation Builder",days:"Days 91-120",color:"#F59E0B",
description:"Make different tools work together without manual effort.",
sprints:[
{id:7,title:"Connect Your Tools",days:"Days 91-105",
tools:["Zapier (free tier)","Make (free tier)","Claude"],
toolCourses:[{name:"Zapier University",type:"Free",note:"Official courses: Zapier 101, Multi-Step Zaps, Paths & Filters"},{name:"Make Academy",type:"Free",note:"Official courses: Make Fundamentals, Scenarios, Routers"},{name:"AI Automation PH YouTube: Zapier & Make",type:"Free",note:"Practical automation tutorials for VAs"},{name:"Technical Virtual Assistants PH Course",type:"Paid",note:"Structured Zapier and Make modules with hands-on projects"}],
problem:"Your tools are isolated. Gmail doesn't talk to your CRM. Your calendar doesn't trigger prep workflows. Information lives in silos. You need to connect everything.",
objective:"Learn integration thinking and build practical automations using Zapier and Make that connect your existing tools.",
skills:["Integration thinking (which tools should connect, how)","Zapier: triggers, actions, multi-step Zaps, filters, paths","Make: scenarios, modules, routers, iterators","When to use Zapier vs Make","Error handling basics","Free tier limitations and working within them"],
resources:["AI Automation PH YouTube: Zapier and Make tutorials - Free","Zapier University - Free","Make Academy - Free","Technical Virtual Assistants PH course (if enrolled)"],
useCases:["Auto-adding meeting notes to your CRM after each call","Creating tasks when emails arrive from specific people","Sending weekly digest emails from multiple sources","Automating expense report routing","Syncing calendar events with preparation workflows"],
exercises:["Map your top 5 most repetitive tasks. For each, identify what triggers them and the ideal automated outcome.","Build a Zapier automation that takes a Google Form response and creates entries in 2 different places.","Build the same automation in Make. Compare the experience."],
miniProject:{title:"5 Automations Every EA Needs",desc:"Build and document 5 practical automations: email routing, meeting prep trigger, follow-up creation, form-to-CRM, and weekly digest compilation."},
portfolioProject:{title:"From Manual to Automated: An EA's Integration Journey",desc:"Before/after case study showing 3 workflows you automated, including time saved, tools connected, and lessons learned."},
mistakes:["Automating tasks that don't happen often enough to justify setup","Not testing with real data","Ignoring error notifications","Over-complicating when a simple 2-step automation would work"],
tasks:[
{day:91,focus:"Integration thinking: map data flows between your tools",artifact:"Data flow map of your current tools",detail:"Before building automations, understand what data flows where. Draw a map: Gmail, Calendar, Sheets, CRM, Notion. What data moves between them? What's manual that could be automatic?"},
{day:92,focus:"Zapier intro: triggers, actions, your first Zap",artifact:"Zap: form submission, sheet notification",detail:"Learn the core concept: trigger (something happens) + action (do something). Build a simple Zap: when a Google Form is submitted, add a row to a Google Sheet and send yourself a notification."},
{day:93,focus:"Zapier: multi-step Zaps",artifact:"Zap: email, CRM entry, task",detail:"Multi-step Zaps chain multiple actions. Build one: when you receive an email from a specific person, create a CRM contact AND create a task in your task manager."},
{day:94,focus:"Zapier: filters and paths (conditional logic)",artifact:"Zap with branching logic",detail:"Add intelligence to your Zaps. Filters skip actions when conditions aren't met. Paths create different routes based on conditions: if priority is high, notify immediately; if normal, batch for daily digest."},
{day:95,focus:"Zapier: formatting data between apps",artifact:"Cheat sheet: \"Zapier Data Formatting\"",detail:"Apps structure data differently. Learn to format, split, combine, and transform data between steps. Create a cheat sheet of the most useful formatting recipes."},
{day:96,focus:"Make intro: scenarios, modules, first scenario",artifact:"Scenario: form, sheet, email notification",detail:"Make (formerly Integromat) is more visual and powerful than Zapier. Build your first scenario: form submission triggers a Google Sheets entry and email notification. Compare the experience to Zapier."},
{day:97,focus:"Make: routers and filters (parallel paths)",artifact:"Scenario with routing logic",detail:"Make's router lets you send data down multiple paths simultaneously. Build a scenario that routes data differently based on conditions. This is where Make shines over Zapier."},
{day:98,focus:"Review: Zapier vs Make comparison",artifact:"Comparison doc: \"Zapier vs Make\"",detail:"After using both, write an honest comparison: ease of use, power, pricing, free tier limits, best use cases for each. Include specific examples from your experience."},
{day:99,focus:"Build: Automate Executive Communication",artifact:"Automation: email, categorize, route, notify",detail:"Build a real-world automation: incoming emails get categorized, routed to the right person or folder, and you get notified about urgent ones. Use either Zapier or Make."},
{day:100,focus:"Build: Automate Meeting Prep",artifact:"Automation: calendar, research trigger, brief",detail:"When a meeting appears on your calendar, trigger a prep workflow: send yourself a reminder with attendee names so you can start research. This is the first step toward automated prep."},
{day:101,focus:"Build: Automate Follow-Up Tracking",artifact:"Automation: meeting, tasks, reminders",detail:"After a meeting, automatically create follow-up tasks with deadlines. Set up reminder notifications for tasks approaching their due date. Connect to your existing tracker."},
{day:102,focus:"Build: Automate Client Intake",artifact:"Automation: form, CRM, email, booking",detail:"Connect your intake form to your CRM and email: form submission creates a contact, sends a welcome email, and includes a booking link. Test the complete flow end-to-end."},
{day:103,focus:"Error handling: when automations break",artifact:"SOP: \"Automation Troubleshooting\"",detail:"Automations break. Build an SOP for when they do: how to check error logs, common failure reasons, how to test and fix, and how to set up error notifications so you know quickly."},
{day:104,focus:"Combining AI with automations",artifact:"AI-enhanced automation template",detail:"Add AI to an automation: use Claude (via API or Zapier integration) to process, categorize, or draft within an automated workflow. Document the pattern so you can reuse it."},
{day:105,focus:"Sprint review. Document everything.",artifact:"Sprint 7 summary + public learning post",detail:"Review all automations you've built. Update your portfolio with case studies. Check your artifact counts. Share your automation journey publicly."},
],
checklist:["Can build multi-step automations in Zapier and Make","Understand triggers, actions, filters, conditional logic","Have 5+ working automations","Know when to use Zapier vs Make","Can troubleshoot failed automations","Have documented business impact of each automation"],
},
{id:8,title:"Build Advanced Automations",days:"Days 106-120",
tools:["n8n (free)","Postman (free)","Make","Claude"],
toolCourses:[{name:"n8n Academy & Documentation",type:"Free",note:"Official tutorials: Getting Started, Workflow Basics, HTTP Requests"},{name:"Postman Learning Center",type:"Free",note:"API Fundamentals course - essential before touching any API"},{name:"AI Automation PH YouTube: n8n & APIs",type:"Free",note:"Practical n8n workflows and API integration tutorials"},{name:"Technical Virtual Assistants PH Course",type:"Paid",note:"n8n modules with real-world automation projects"}],
problem:"Basic automations connect two tools. Advanced automations handle complexity: API calls, data transformation, error recovery, and AI-enhanced processing. This is what separates tool users from system builders.",
objective:"Understand APIs, learn n8n, and build complex automations that handle real-world business logic.",
skills:["API fundamentals (requests, responses, authentication)","REST concepts (GET, POST, PUT, DELETE)","Webhooks (receiving real-time data)","Working with JSON data","n8n: nodes, workflows, expressions, HTTP requests","When to use n8n vs Zapier vs Make"],
resources:["AI Automation PH YouTube: n8n and API tutorials - Free","Postman Learning Center - Free","n8n documentation and community tutorials - Free","Technical Virtual Assistants PH course (if enrolled)"],
useCases:["Pulling data from tools without native integrations","Building custom integrations between any two services","Creating webhook endpoints for real-time data processing","Building automations with complex data transformation"],
exercises:["Use Postman to call a free public API (weather, news). Read the response and identify useful data.","Build an n8n workflow triggered by a webhook that processes incoming data.","Create an automation that calls an API, transforms the data, and stores it in Google Sheets."],
miniProject:{title:"API-Powered Daily Brief",desc:"An n8n or Make workflow that calls 2-3 APIs (news, weather, calendar), processes the results, and emails a formatted daily briefing."},
portfolioProject:{title:"Custom Integration Builder",desc:"Document how you connected two tools without a native integration, using APIs and n8n/Make. Show the problem, research, solution architecture, and working workflow."},
mistakes:["Being intimidated by APIs (they're just structured requests)","Jumping to n8n before understanding automation basics","Hardcoding API keys in shareable workflows","Not reading API documentation carefully"],
tasks:[
{day:106,course:{name:"Building with Claude API (Part 1)",duration:"2 hrs",type:"anthropic"},focus:"APIs explained: what they are, why they matter",artifact:"Cheat sheet: \"APIs for Non-Developers\"",detail:"APIs let software talk to other software. Think of it like a restaurant: you (the client) send an order (request) to the kitchen (server), and you get food back (response). Write this explanation in your own words."},
{day:107,course:{name:"Building with Claude API (Part 2)",duration:"2 hrs",type:"anthropic"},focus:"API basics: requests, responses, status codes",artifact:"Documentation: \"API Vocabulary Guide\"",detail:"Learn the vocabulary: endpoint (URL), method (GET/POST), headers (metadata), body (data), status codes (200=success, 404=not found, 401=unauthorized). Create a reference guide."},
{day:108,course:{name:"Building with Claude API (Part 3)",duration:"2 hrs",type:"anthropic"},focus:"Making API calls with Postman",artifact:"3+ successful API calls documented",detail:"Download Postman (free). Make your first API call to a free public API (try OpenWeatherMap, NewsAPI, or JSONPlaceholder). Document each call: what you sent, what you got back."},
{day:109,course:{name:"Building with Claude API (Part 4)",duration:"2 hrs",type:"anthropic"},focus:"Authentication: API keys, OAuth basics",artifact:"Notes: \"API Authentication Methods\"",detail:"Most APIs require authentication. Learn about API keys (simple), OAuth (complex but common), and bearer tokens. Document the differences and when each is used."},
{day:110,focus:"Working with JSON: reading structured data",artifact:"Cheat sheet: \"Reading JSON Data\"",detail:"JSON is how APIs send data. Learn to read it: objects (curly braces), arrays (square brackets), key-value pairs, nested structures. Create a cheat sheet with examples from real API responses."},
{day:111,focus:"Webhooks: receiving data in real-time",artifact:"Webhook test: receive and process data",detail:"Webhooks are the opposite of API calls: instead of you asking for data, data is sent TO you when something happens. Set up a test webhook endpoint and trigger it."},
{day:112,course:{name:"Introduction to MCP",duration:"1.5-2 hrs",type:"anthropic"},focus:"Review day. Practice more API calls.",artifact:"API practice log with 5+ calls",detail:"Make 5+ different API calls. Try different methods (GET, POST). Try different APIs. Get comfortable with the request/response pattern. Document everything in your practice log."},
{day:113,focus:"n8n intro: interface, nodes, first workflow",artifact:"n8n workflow: webhook, process, email",detail:"Set up n8n (cloud free tier or self-hosted). Build your first workflow: a webhook receives data, you process it (format, filter), and send an email with the results."},
{day:114,focus:"n8n: HTTP Request node (calling APIs)",artifact:"n8n workflow with external API call",detail:"Use n8n's HTTP Request node to call an external API. Process the response and do something useful with the data (store it, send it, display it)."},
{day:115,focus:"n8n: conditional logic and branching",artifact:"n8n workflow with IF/switch nodes",detail:"Add decision-making to your n8n workflows. Use IF nodes to branch based on conditions. Use Switch nodes for multiple paths. Build a workflow that handles different scenarios."},
{day:116,focus:"n8n: data transformation (merge, split, reshape)",artifact:"n8n workflow with data processing",detail:"Learn n8n's data transformation nodes: merge data from multiple sources, split arrays into individual items, reshape data structures. Build a workflow that combines data from 2 sources."},
{day:117,focus:"n8n: error handling and retry logic",artifact:"n8n workflow with error handling",detail:"Add error handling to your workflows: try/catch patterns, retry on failure, error notifications. A production workflow needs to handle failures gracefully."},
{day:118,course:{name:"MCP: Advanced Topics",duration:"1.5 hrs",type:"anthropic"},focus:"Advanced Make: API calls within scenarios",artifact:"Make scenario with HTTP module",detail:"Use Make's HTTP module to call APIs within a scenario. Compare the experience to n8n. Some tasks are easier in one tool vs the other."},
{day:119,focus:"Build: complex automation for a real business problem",artifact:"End-to-end automation with API + logic + AI",detail:"Bring everything together: build an automation that calls an API, processes the data with conditional logic, optionally uses AI for analysis, and delivers a useful output."},
{day:120,focus:"Phase 4 complete. Sprint review. Milestone check.",artifact:"Milestone review + public learning post",detail:"Phase 4 done! You can now connect any tools together. Review your skills, update your portfolio, and write your Phase 4 reflection."},
],
checklist:["Can explain what an API is to a non-technical colleague","Can make API calls and read JSON responses","Have built 3+ n8n workflows","Understand webhooks and when to use them","Can troubleshoot API errors","Know when to choose Zapier vs Make vs n8n"],
},
]},
{id:5,title:"AI Systems",days:"Days 121-150",color:"#10B981",
description:"Build intelligent systems that think, not just automate.",
sprints:[
{id:9,title:"Build AI Agents & Intelligent Workflows",days:"Days 121-135",
tools:["Claude","n8n or Make","Your automation stack"],
problem:"Your automations run on rules: if X, then Y. AI agents run on judgment: read this, figure out what's important, and take the right action. That's the future of EA work.",
objective:"Design and build AI agents that can handle multi-step tasks with judgment, including guardrails and human-in-the-loop approval patterns.",
skills:["What AI agents are and how they differ from automations","Agent design: plan, execute, review, adjust","Human-in-the-loop patterns","Agent guardrails (preventing errors)","Multi-step autonomous workflows","Combining AI with automation platforms"],
resources:["AI Automation PH YouTube: AI agent content - Free","Anthropic documentation: tool use, function calling - Free","n8n documentation: AI nodes and workflows - Free","Technical Virtual Assistants PH course (if enrolled)"],
useCases:["An agent that categorizes 50 emails and tells you what's urgent","An agent that preps you for all tomorrow's meetings automatically","An agent that monitors industry news and flags what matters","An agent that generates weekly reports from multiple sources"],
exercises:["Design an agent workflow on paper: inputs, decision points, actions, approval gates, outputs.","Build a simple agent in n8n that takes input, uses AI to decide, and takes different actions.","Create a human-in-the-loop workflow: agent drafts, waits for approval, then acts."],
miniProject:{title:"Email Triage Agent",desc:"An AI workflow that reads emails, categorizes them (urgent / action needed / FYI / delegate / archive), drafts responses for routine ones, and sends you a summary."},
portfolioProject:{title:"Building Your First AI Agent: A Practical Guide",desc:"Tutorial-style case study showing how to design, build, test, and deploy an AI agent for EA work. Include concept, tools, workflow, test results, and honest lessons learned."},
mistakes:["Making agents too autonomous too early (start with human-in-the-loop)","Not defining clear success criteria","Skipping guardrails (agents will hallucinate)","Building agents for rare tasks (not worth the setup)"],
tasks:[
{day:121,course:{name:"Introduction to Agent Skills",duration:"1 hr",type:"anthropic"},focus:"What are AI agents? How do they differ from automations?",artifact:"Cheat sheet: \"Automations vs AI Agents\"",detail:"Automations follow rules: IF email from boss THEN star it. Agents use judgment: read this email, decide if it's urgent based on content, and take appropriate action. Document the key differences."},
{day:122,focus:"Agent design patterns: when to use agents vs rules",artifact:"Decision framework: \"Agent or Automation?\"",detail:"Not everything needs an agent. Build a decision framework: use automation when the logic is clear and consistent. Use agents when judgment is needed or situations vary. Include examples."},
{day:123,focus:"Simple agent concept: Claude with structured instructions",artifact:"Agent design doc: \"Research Agent\"",detail:"Design (on paper) an agent that takes a research question, breaks it into sub-questions, researches each, synthesizes findings, and produces a brief. Don't build yet, just design."},
{day:124,focus:"Agent workflows: plan, execute, review",artifact:"Workflow template: \"Agent Task Loop\"",detail:"The core agent pattern: 1) Receive task, 2) Plan approach, 3) Execute steps, 4) Review output quality, 5) Adjust if needed, 6) Deliver result. Create a reusable template for this pattern."},
{day:125,focus:"Human-in-the-loop: when agents should pause and ask",artifact:"SOP: \"Designing Human Approval Points\"",detail:"Agents shouldn't do everything autonomously. Define when an agent should pause: before sending external communications, when confidence is low, when the action is irreversible, when money is involved."},
{day:126,focus:"Agent guardrails: preventing mistakes",artifact:"Checklist: \"AI Agent Quality Controls\"",detail:"Build a checklist of guardrails: output validation, confidence thresholds, fallback behaviors, error logging, human escalation triggers, and testing protocols."},
{day:127,course:{name:"Claude Code: Subagents",duration:"1 hr",type:"anthropic"},focus:"Review day. Test agent concepts with real scenarios.",artifact:"Tested agent designs + refinements",detail:"Take your agent designs and test them mentally with 5 real scenarios. Would the agent handle them correctly? Where would it fail? What guardrails are missing? Refine your designs."},

/* ── helpers ── */
const totalDays=180;
function scrollTop(){window.scrollTo({top:0,behavior:"smooth"});}

/* ── progress storage: window.storage → localStorage → memory ── */
const MEM={};
async function loadProgress(){
  try{if(window.storage){const r=await window.storage.get("kate-progress");if(r&&r.value)return JSON.parse(r.value);}}catch(e){}
  try{const d=localStorage.getItem("kate-progress");if(d)return JSON.parse(d);}catch(e){}
  return MEM.p||{days:[],artifacts:{}};
}
async function saveProgress(p){
  MEM.p=p;
  try{if(window.storage){await window.storage.set("kate-progress",JSON.stringify(p));return;}}catch(e){}
  try{localStorage.setItem("kate-progress",JSON.stringify(p));}catch(e){}
}
function deriveState(p){
  const done=p.days||[];
  const count=done.length;
  const currentDay=count?Math.max(...done):0;
  let curSprint=null,curPhase=null,nextDay=null;
  outer:for(const ph of PHASES)for(const s of ph.sprints)for(const t of s.tasks){
    if(!done.includes(t.day)){curSprint=s;curPhase=ph;nextDay=t;break outer;}
  }
  if(!curPhase){curPhase=PHASES[PHASES.length-1];curSprint=curPhase.sprints[curPhase.sprints.length-1];}
  const artifacts={};ARTIFACT_CATS.forEach(c=>artifacts[c.key]=(p.artifacts&&p.artifacts[c.key])||0);
  return{done,count,currentDay,curSprint,curPhase,nextDay,artifacts,pct:Math.round(count/totalDays*100)};
}
function phaseRange(ph){const m=ph.days.match(/(\d+)-(\d+)/);return[+m[1],+m[2]];}
function phaseStatus(ph,st){
  const[a,b]=phaseRange(ph);
  const daysIn=st.done.filter(d=>d>=a&&d<=b).length;
  const total=b-a+1;
  if(daysIn>=total)return{label:"Completed",cls:"done",daysIn,total};
  if(daysIn>0||st.curPhase.id===ph.id&&st.count>0)return{label:"In progress",cls:"cur",daysIn,total};
  if(st.curPhase.id===ph.id)return{label:"Up next",cls:"cur",daysIn,total};
  return{label:"Locked",cls:"",daysIn,total};
}

          <h2>Follow the journey from day one</h2>
          <p>New entries as they happen: projects, prompts, and honest reflections. No spam, just the journal.</p>
          <a className="btn btn-primary" href="#" onClick={e=>e.preventDefault()}>Get updates</a>
        </div>
      </div>
    </section>
  </div>);
}

/* ── Roadmap (phases) ── */
function Roadmap({openPhase,st}){
  return(
  <div className="wrap fade">
    <section>
      <div className="sec-head">
        <p className="sec-eyebrow">The Roadmap</p>
        <h2>Six phases, twelve sprints, 180 days</h2>
        <p>Each phase is 30 days split into two sprints, each ending with real projects. Click any phase to see its sprints, skills, day-by-day plan, and checklists.</p>
      </div>
      <div className="phases">
        {PHASES.map(ph=>(
          <button className="phase-card" key={ph.id} onClick={()=>openPhase(ph.id)}>
            <div className="tint-bar" style={{background:PHASE_COLORS[ph.id]}}></div>
            <div className="top">
              <span className="num">PHASE {String(ph.id).padStart(2,"0")}</span>
              <span className="icon">{PHASE_ICONS[ph.id]}</span>
            </div>
            <h3>{ph.title}</h3>
            <p className="days mono">{ph.days}</p>
            <p className="desc">{ph.description}</p>
            <div className="foot">
              <span style={{color:PHASE_COLORS[ph.id]}}>{(()=>{const ps=phaseStatus(ph,st);return ps.daysIn>0?ps.daysIn+"/"+ps.total+" days · "+ps.label:ps.label;})()}</span>
              <span className="go">→</span>
            </div>
          </button>
        ))}
      </div>
    </section>
  </div>);
}

/* ── Phase detail ── */
function PhaseView({phase,go,openSprint,st}){
  return(
  <div className="wrap fade">
    <div className="crumb">
      <button onClick={()=>go("roadmap")}>Roadmap</button>
      <span className="sep">/</span><span>Phase {phase.id}</span>
    </div>
    <div className="detail-hero" style={{background:PHASE_WASH[phase.id]}}>
      <span className="days-pill">{phase.days.toUpperCase()}</span>
      <h2>{PHASE_ICONS[phase.id]} {phase.title}</h2>
      <p>{phase.description}</p>
    </div>
    <div className="sprint-list" style={{marginBottom:"48px"}}>
      {phase.sprints.map(s=>(
        <button className="sprint-card" key={s.id} onClick={()=>openSprint(phase.id,s.id)}>
          <span className="num">SPRINT {String(s.id).padStart(2,"0")} · {s.days.toUpperCase()}</span>
          <h3>{s.title}</h3>
          <p className="prob">{s.objective}</p>
          <div className="tools">{s.tools.map(t=><span className="chip" key={t}>{t}</span>)}</div>
        </button>
      ))}
    </div>
  </div>);
}

/* ── Sprint detail ── */
function SprintView({phase,sprint,go,openPhase,st,toggleDay}){
  const [openDay,setOpenDay]=useState(null);
  return(
  <div className="wrap fade">
    <div className="crumb">
      <button onClick={()=>go("roadmap")}>Roadmap</button><span className="sep">/</span>
      <button onClick={()=>openPhase(phase.id)}>{phase.title}</button><span className="sep">/</span>
      <span>Sprint {sprint.id}</span>
    </div>
    <div className="detail-hero" style={{background:PHASE_WASH[phase.id]}}>
      <span className="days-pill">{sprint.days.toUpperCase()}</span>
      <h2>{sprint.title}</h2>
      <p>{sprint.objective}</p>
      <div className="tools" style={{marginTop:"14px"}}>{sprint.tools.map(t=><span className="chip" key={t} style={{background:"rgba(255,255,255,.7)"}}>{t}</span>)}</div>
    </div>

    <div className="block">
      <h3><span className="bi">🎯</span>The problem this sprint solves</h3>
      <p className="body">{sprint.problem}</p>
    </div>

    <div className="two-col">
      <div className="block">
        <h3><span className="bi">🧠</span>Skills you'll build</h3>
        <ul>{sprint.skills.map((s,i)=><li key={i}>{s}</li>)}</ul>
      </div>
      <div className="block">
        <h3><span className="bi">💼</span>Real-world use cases</h3>
        <ul>{sprint.useCases.map((s,i)=><li key={i}>{s}</li>)}</ul>
      </div>
    </div>

    <div className="block">
      <h3><span className="bi">📚</span>Resources</h3>
      <ul>{sprint.resources.map((s,i)=><li key={i}>{s}</li>)}</ul>
      {sprint.toolCourses&&<ul style={{marginTop:"9px"}}>{sprint.toolCourses.map((s,i)=><li key={"t"+i}>{typeof s==="string"?s:s.name+" - "+s.desc}</li>)}</ul>}
    </div>

    <div className="block">
      <h3><span className="bi">✍️</span>Practice exercises</h3>
      <ul>{sprint.exercises.map((s,i)=><li key={i}>{s}</li>)}</ul>
    </div>

    {(sprint.miniProject||sprint.portfolioProject)&&(
      <div className="block">
        <h3><span className="bi">🚀</span>Projects</h3>
        {sprint.miniProject&&(
          <div className="proj"><span className="tag">Mini project</span><b>{sprint.miniProject.title}</b><p>{sprint.miniProject.desc}</p></div>
        )}
        {sprint.portfolioProject&&(
          <div className="proj"><span className="tag">Portfolio project</span><b>{sprint.portfolioProject.title}</b><p>{sprint.portfolioProject.desc}</p></div>
        )}
      </div>
    )}

    <div className="block">
      <h3><span className="bi">📅</span>Day-by-day plan <span className="toggle-hint">- click a day for details, tap the circle to mark it done</span></h3>
      <div>
        {sprint.tasks.map(t=>(
          <div className={"day-row"+(st.done.includes(t.day)?" is-done":"")} key={t.day} onClick={()=>setOpenDay(openDay===t.day?null:t.day)}>
            <span className="dnum">
              <button className="day-check" aria-label={"Mark day "+t.day+(st.done.includes(t.day)?" incomplete":" complete")} onClick={e=>{e.stopPropagation();toggleDay(t.day);}}>{st.done.includes(t.day)?"✓":""}</button>
              DAY {t.day}
            </span>
            <div>
              <div className="focus">{t.focus}</div>
              {t.artifact&&<div className="art">↳ Build: {t.artifact}</div>}
              {t.course&&<span className="course-pill">🎓 {t.course.name} · {t.course.duration}</span>}
              {openDay===t.day&&t.detail&&<div className="det fade">{t.detail}</div>}
            </div>
          </div>
        ))}
      </div>
    </div>

    {sprint.mistakes&&(
      <div className="block mist">
        <h3><span className="bi">⚠️</span>Common mistakes to avoid</h3>
        <ul>{sprint.mistakes.map((s,i)=><li key={i}>{s}</li>)}</ul>
      </div>
    )}

    {sprint.checklist&&(
      <div className="block">
        <h3><span className="bi">✅</span>Sprint completion checklist</h3>
        <ul className="check-grid">{sprint.checklist.map((s,i)=><li key={i}>{s}</li>)}</ul>
      </div>
    )}
    <div className="back-row" style={{paddingBottom:"48px"}}>
      <button onClick={()=>openPhase(phase.id)}>← Back to {phase.title}</button>
    </div>
  </div>);
}

/* ── Courses ── */
function Courses(){
  const [filter,setFilter]=useState("all");
  const types={all:"All",anthropic:"Anthropic",tool:"Tool courses",paid:"Paid"};
  const list=ALL_COURSES.filter(c=>filter==="all"||c.type===filter).sort((a,b)=>a.day-b.day);
  return(
  <div className="wrap fade">
    <section>
      <div className="sec-head">
        <p className="sec-eyebrow">The Curriculum</p>
        <h2>Every course on the journey</h2>
        <p>{ALL_COURSES.length} courses scheduled across 180 days, most of them free. "Day 0" courses can be taken anytime.</p>
      </div>
      <div className="filters">
        {Object.entries(types).map(([k,l])=>(
          <button key={k} className={filter===k?"on":""} onClick={()=>setFilter(k)}>{l}</button>
        ))}
      </div>
      <div style={{display:"grid",gap:"12px",paddingBottom:"40px"}}>
        {list.map(c=>(
          <div className="course-item" key={c.id}>
            <span className="cday">{c.day===0?"ANYTIME":"DAY "+c.day}</span>
            <div>
              <b>{c.name}</b>
              <span className={"type-tag t-"+c.type}>{c.type==="anthropic"?"Anthropic":c.type==="tool"?"Tool":"Paid"}</span>
              <p>{c.desc}</p>
            </div>
            <span className="dur">{c.duration}</span>
          </div>
        ))}
      </div>
    </section>
  </div>);
}

/* ── Artifacts ── */
function Artifacts({st,bump}){
  return(
  <div className="wrap fade">
    <section>
      <div className="sec-head">
        <p className="sec-eyebrow">The Output</p>
        <h2>What 180 days will produce</h2>
        <p>Learning here means building. These are the artifact targets for the full journey, and every one becomes part of a public portfolio. Use + and − to log what you've built.</p>
      </div>
      <div className="stats" style={{paddingBottom:"40px"}}>
        {ARTIFACT_CATS.map(c=>(
          <div className="stat" key={c.key}>
            <span className="ic">{c.icon}</span>
            <div className="n mono">{st.artifacts[c.key]}<small> / {c.target}</small></div>
            <div className="l">{c.label}</div>
            <div className="stepper">
              <button aria-label={"Remove one from "+c.label} onClick={()=>bump(c.key,-1)}>−</button>
              <button aria-label={"Add one to "+c.label} onClick={()=>bump(c.key,1)}>+</button>
            </div>
          </div>
        ))}
      </div>
    </section>
  </div>);
}

/* ── Notebook ── */
const NOTE_CATS=["Note","Link","Idea","Resource"];
function Notebook({notes,addNote,deleteNote}){
  const [text,setText]=useState("");
  const [link,setLink]=useState("");
  const [cat,setCat]=useState("Note");
  const [filter,setFilter]=useState("All");
  const submit=()=>{
    if(!text.trim()&&!link.trim())return;
    addNote({id:Date.now(),text:text.trim(),link:link.trim(),cat,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})});
    setText("");setLink("");
  };
  const shown=notes.filter(n=>filter==="All"||n.cat===filter);
  return(
  <div className="wrap fade">
    <section>
      <div className="sec-head">
        <p className="sec-eyebrow">The Notebook</p>
        <h2>Notes, links, and ideas</h2>
        <p>A scratchpad for the journey: save useful links, quick thoughts, and resources to come back to. Everything is stored with your progress.</p>
      </div>

      <div className="note-form">
        <textarea placeholder="Write a note, an idea, or a description for a link..." value={text} onChange={e=>setText(e.target.value)} rows="3"></textarea>
        <input type="url" placeholder="Optional link (https://...)" value={link} onChange={e=>setLink(e.target.value)}/>
        <div className="note-form-row">
          <div className="filters" style={{margin:0}}>
            {NOTE_CATS.map(c=>(
              <button key={c} className={cat===c?"on":""} onClick={()=>setCat(c)}>{c}</button>
            ))}
          </div>
          <button className="btn btn-primary" onClick={submit}>Save entry</button>
        </div>
      </div>

      {notes.length>0&&(
        <div className="filters" style={{marginTop:"26px"}}>
          {["All",...NOTE_CATS].map(c=>(
            <button key={c} className={filter===c?"on":""} onClick={()=>setFilter(c)}>{c}{c!=="All"?" ("+notes.filter(n=>n.cat===c).length+")":""}</button>
          ))}
        </div>
      )}

      <div style={{display:"grid",gap:"12px",paddingBottom:"40px",marginTop:notes.length?"6px":"0"}}>
        {shown.length===0&&(
          <div className="note-empty">
            <span style={{fontSize:"1.6rem",display:"block",marginBottom:"8px"}}>📓</span>
            {notes.length===0?"Your notebook is empty. Save your first note or link above.":"No entries in this category yet."}
          </div>
        )}
        {shown.map(n=>(
          <div className="note-card" key={n.id}>
            <div className="note-top">
              <span className={"note-cat nc-"+n.cat.toLowerCase()}>{n.cat}</span>
              <span className="note-date mono">{n.date}</span>
              <button className="note-del" aria-label="Delete entry" onClick={()=>deleteNote(n.id)}>✕</button>
            </div>
            {n.text&&<p className="note-text">{n.text}</p>}
            {n.link&&<a className="note-link" href={n.link} target="_blank" rel="noopener noreferrer">🔗 {n.link.replace(/^https?:\/\//,"").slice(0,60)}</a>}
          </div>
        ))}
      </div>
    </section>
  </div>);
}

/* ── Now ── */
function Now({st}){
  const started=st.count>0;
  const nextCourse=ALL_COURSES.filter(c=>c.day>st.currentDay).sort((a,b)=>a.day-b.day)[0];
  return(
  <div className="wrap fade">
    <section>
      <div className="sec-head">
        <p className="sec-eyebrow">Now</p>
        <h2>What I'm doing right now</h2>
        <p>This page updates as the journey moves, so check back to see what's current.</p>
      </div>
      <div className="now-grid" style={{paddingBottom:"40px"}}>
        <div className="now-card"><span className="icon">📚</span><p className="k">Current sprint</p><p className="v">{started?st.curSprint.title:"Preparing the 180-day plan"}</p></div>
        <div className="now-card"><span className="icon">🧭</span><p className="k">Current phase</p><p className="v">{started?st.curPhase.title:"AI Foundations, up first"}</p></div>
        <div className="now-card"><span className="icon">🛠️</span><p className="k">{started?"Next task":"Setting up"}</p><p className="v">{started&&st.nextDay?"Day "+st.nextDay.day+": "+st.nextDay.focus:"This learning journal"}</p></div>
        <div className="now-card"><span className="icon">🎓</span><p className="k">Next course</p><p className="v">{nextCourse?nextCourse.name+" (Day "+nextCourse.day+")":"All courses done!"}</p></div>
      </div>
    </section>
  </div>);
}

/* ── App ── */
function App(){
  const [route,setRoute]=useState({view:"home"});
  const [prog,setProg]=useState({days:[],artifacts:{}});
  useEffect(()=>{loadProgress().then(setProg);},[]);
  const st=deriveState(prog);
  const toggleDay=day=>{
    const days=prog.days.includes(day)?prog.days.filter(d=>d!==day):[...prog.days,day];
    const p={...prog,days};setProg(p);saveProgress(p);
  };
  const bumpArtifact=(key,delta)=>{
    const a={...(prog.artifacts||{})};a[key]=Math.max(0,(a[key]||0)+delta);
    const p={...prog,artifacts:a};setProg(p);saveProgress(p);
  };
  const notes=prog.notes||[];
  const addNote=n=>{const p={...prog,notes:[n,...notes]};setProg(p);saveProgress(p);};
  const deleteNote=id=>{const p={...prog,notes:notes.filter(n=>n.id!==id)};setProg(p);saveProgress(p);};
  const go=v=>{setRoute({view:v});scrollTop();};
  const openPhase=id=>{setRoute({view:"phase",phaseId:id});scrollTop();};
  const openSprint=(pid,sid)=>{setRoute({view:"sprint",phaseId:pid,sprintId:sid});scrollTop();};

  const phase=PHASES.find(p=>p.id===route.phaseId);
  const sprint=phase&&route.sprintId?phase.sprints.find(s=>s.id===route.sprintId):null;

  return(
  <React.Fragment>
    <style>{css}</style>
    <Nav view={["phase","sprint"].includes(route.view)?"roadmap":route.view} go={go}/>
    {route.view==="home"&&<Home go={go} openPhase={openPhase} st={st}/>}
    {route.view==="roadmap"&&<Roadmap openPhase={openPhase} st={st}/>}
    {route.view==="phase"&&phase&&<PhaseView phase={phase} go={go} openSprint={openSprint} st={st}/>}
    {route.view==="sprint"&&phase&&sprint&&<SprintView phase={phase} sprint={sprint} go={go} openPhase={openPhase} st={st} toggleDay={toggleDay}/>}
    {route.view==="courses"&&<Courses/>}
    {route.view==="artifacts"&&<Artifacts st={st} bump={bumpArtifact}/>}
    {route.view==="notebook"&&<Notebook notes={notes} addNote={addNote} deleteNote={deleteNote}/>}
    {route.view==="now"&&<Now st={st}/>}
    <footer>
      <div className="wrap">
        <span>© 2026 Learning AI with Kate</span>
        <span className="mono" style={{fontSize:".78rem"}}>Learn. Build. Automate. Share. · <button onClick={()=>go("home")}>Back home</button></span>
      </div>
    </footer>
  </React.Fragment>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
